<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Express Logistics</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f5f5f5;
    }

    h1 {
      margin-top: 50px;
    }

    .box {
      margin-top: 30px;
    }

    input {
      padding: 12px;
      width: 250px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    button {
      padding: 12px 20px;
      background: gold;
      border: none;
      border-radius: 5px;
      margin-left: 10px;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <h1>Track Your Shipment</h1>

  <div class="box">
    <input id="trackingInput" placeholder="Enter tracking number">
    <button onclick="trackShipment()">Track</button>
  </div>

  <!-- 🔥 PASTE FIREBASE SCRIPT RIGHT HERE (BEFORE </body>) -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBcvsXXC_SkKcovUqo4DMpqhM_wmhoDMZQ",
      authDomain: "express-logistics-40825.firebaseapp.com",
      projectId: "express-logistics-40825",
      storageBucket: "express-logistics-40825.firebasestorage.app",
      messagingSenderId: "191523858778",
      appId: "1:191523858778:web:b6fc8dbac45d5925ab6b63"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.trackShipment = async function () {
      const trackingNumber = document.getElementById("trackingInput").value;

      const docRef = doc(db, "shipments", trackingNumber);
      const docSnap = await getDoc(docRef);

      if (docSnap.exists()) {
        const data = docSnap.data();
        alert(
          "Status: " + data.status + "\n" +
          "Location: " + data.location + "\n" +
          "Date: " + data.date
        );
      } else {
        alert("Tracking number not found");
      }
    };
  </script>
<script type="module">

};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// TRACK FUNCTION
window.trackShipment = async function () {

  if (docSnap.exists()) {

</script>
</body>
</html>
