<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
</head>

<body>
  <h2>Add Shipment</h2>

  <input id="id" placeholder="Tracking ID"><br><br>
  <input id="status" placeholder="Status"><br><br>
  <input id="location" placeholder="Location"><br><br>
  <input id="date" placeholder="Date"><br><br>

  <button onclick="addShipment()">Add</button>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<script>
  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_PROJECT.firebaseapp.com",
    projectId: "YOUR_PROJECT_ID",
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  function addShipment() {
    const id = document.getElementById("id").value;

    db.collection("shipments").doc(id).set({
      status: document.getElementById("status").value,
      location: document.getElementById("location").value,
      date: document.getElementById("date").value
    });

    alert("Shipment added!");
  }
</script>

</body>
</html>
