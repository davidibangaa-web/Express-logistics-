<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Express Logistics</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f5f5f5;
    }

    .hero {
      background: url('https://images.unsplash.com/photo-1586528116311-ad8dd3c8310d') center/cover no-repeat;
      height: 300px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: white;
    }

    .hero h1 {
      font-size: 30px;
      margin: 0;
    }

    .card {
      background: white;
      margin: -50px auto 20px;
      padding: 20px;
      width: 90%;
      max-width: 400px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 12px;
      background: gold;
      border: none;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
    }

    #result {
      margin-top: 15px;
      font-size: 14px;
    }
  </style>
</head>

<body>

  <div class="hero">
    <div>
      <h1>Simple, Affordable, Reliable</h1>
      <p>Track your shipment anytime, anywhere</p>
    </div>
  </div>

  <div class="card">
    <h3>Track Your Shipment</h3>

    <input id="trackingInput" placeholder="Enter tracking number" />
    <button onclick="trackShipment()">Track</button>

    <div id="result"></div>
  </div>

  <!-- FIREBASE STARTS HERE -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBcvsXXC_SkKcovUqo4DMpqhM_wmhoDMZQ",
      authDomain: "express-logistics-40825.firebaseapp.com",
      projectId: "express-logistics-40825",
      storageBucket: "express-logistics-40825.firebasestorage.app",
      messagingSenderId: "191523858778",
      appId: "1:191523858778:web:b6fc8dbac45d5925ab6b63"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    async function trackShipment() {
      const trackingNumber = document.getElementById("trackingInput").value;

      const docRef = doc(db, "shipments", trackingNumber);
      const docSnap = await getDoc(docRef);

      if (docSnap.exists()) {
        const data = docSnap.data();
        document.getElementById("result").innerHTML = `
          <p><b>Status:</b> ${data.status}</p>
          <p><b>Location:</b> ${data.location}</p>
        `;
      } else {
        document.getElementById("result").innerHTML = "❌ Tracking number not found";
      }
    }

    window.trackShipment = trackShipment;
  </script>

</body>
</html>
