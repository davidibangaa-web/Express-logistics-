<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Express Logistics</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f5f5f5;
    }

    .hero {
      background: url('https://images.unsplash.com/photo-1586528116311-ad8dd3c8310d');
      background-size: cover;
      color: white;
      padding: 60px 20px;
      text-align: center;
    }

    .container {
      padding: 20px;
    }

    input {
      width: 70%;
      padding: 12px;
      font-size: 16px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      padding: 12px 20px;
      background: #f4c542;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
    }

    .card {
      background: white;
      margin-top: 20px;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    .timeline {
      margin-top: 20px;
    }

    .step {
      padding: 10px;
      border-left: 4px solid #f4c542;
      margin-bottom: 10px;
    }

    .error {
      color: red;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<div class="hero">
  <h1>Track your shipment anytime</h1>
</div>

<div class="container">
  <h2>Track Your Shipment</h2>

  <input id="trackingInput" placeholder="Enter tracking number">
  <button onclick="track()">Track</button>

  <div id="result"></div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<script>
  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_PROJECT.firebaseapp.com",
    projectId: "YOUR_PROJECT_ID",
  };

  const app = firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  async function track() {
    const id = document.getElementById("trackingInput").value;
    const result = document.getElementById("result");

    const doc = await db.collection("shipments").doc(id).get();

    if (!doc.exists) {
      result.innerHTML = "<p class='error'>❌ Tracking number not found</p>";
      return;
    }

    const data = doc.data();

    result.innerHTML = `
      <div class="card">
        <h3>Status: ${data.status}</h3>
        <p><b>Location:</b> ${data.location}</p>
        <p><b>Date:</b> ${data.date}</p>

        <div class="timeline">
          <div class="step">📦 Shipment Created</div>
          <div class="step">🚚 In Transit</div>
          <div class="step">📍 ${data.location}</div>
          <div class="step">📬 Out for Delivery</div>
          <div class="step">✅ Delivered</div>
        </div>
      </div>
    `;
  }
</script>

</body>
</html>
